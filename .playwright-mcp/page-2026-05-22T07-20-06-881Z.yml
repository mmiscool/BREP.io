      - paragraph [ref=e453]:
        - text: BREP.io is a browser-based CAD application and JavaScript kernel for feature-based solid modeling. At its core is a BREP-style modeler with explicit geometry/topology objects such as
        - code [ref=e454]: Solid
        - text: ","
        - code [ref=e455]: Face
        - text: ","
        - code [ref=e456]: Edge
        - text: ", and"
        - code [ref=e457]: Vertex
        - text: ", paired with an editable feature-history pipeline. It also includes sketch workflows powered by a standalone 2D constraint solver, plus robust manifold booleans ("
        - link "manifold-3d" [ref=e458] [cursor=pointer]:
          - /url: https://github.com/elalish/manifold
        - text: ), mesh repair/import tooling, assembly constraints, PMI annotations, and embeddable CAD/sketcher APIs.
      - paragraph [ref=e459]: This project is in active development and APIs may continue to evolve.
