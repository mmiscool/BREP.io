name: Bug report
description: Report a bug in BREP
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        For faster debugging, please generate a reproducible test case with the `🪲` bug button in the app:
        1. Reproduce the bug.
        2. Click `🪲` in the toolbar.
        3. Paste the generated snippet below (or write "N/A" if not possible).

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Briefly describe the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: test_case
    attributes:
      label: Bug-button test case snippet
      description: Paste the snippet generated by the `🪲` button.
      render: javascript
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add logs, screenshots, links, or anything else useful.
    validations:
      required: false
