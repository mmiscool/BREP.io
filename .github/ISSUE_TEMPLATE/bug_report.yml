name: Bug report
description: Report a bug in BREP
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: problem_description
    attributes:
      label: Problem Description
      description: Describe the problem clearly and include steps if relevant.
    validations:
      required: true

  - type: textarea
    id: test_case_script
    attributes:
      label: Test case script from the bug button
      description: "Use the `🪲` button in the app and paste the generated script."
      render: javascript
      placeholder: |
        // Paste script generated from the bug button
    validations:
      required: false

  - type: textarea
    id: logs_and_additional_info
    attributes:
      label: Console logs and additional information
      description: Paste console output and any extra context (screenshots, links, notes).
      render: shell
    validations:
      required: false
